name: GitStatsMe Dashboard

on:
  workflow_dispatch:          # manual trigger
  schedule:
    - cron: '0 0 * * *'       # daily at midnight UTC

jobs:
  update-stats:
    name: Update GitHub Stats Dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: write           # needed to push the README update

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate & embed stats dashboard
        uses: devhiteshk/GitStatsMe@main
        with:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SECTION_NAME: 'my-git-stats'
          COMMIT_MESSAGE: 'chore: update git stats dashboard'
          SHOW_PRIVATE: 'false'
          MAX_REPOS: '0'
